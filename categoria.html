    let cart = (() => { try { return JSON.parse(localStorage.getItem('sk_cart')) || []; } catch { return []; } })();
    let precioMin = 0;
    let precioMax = Infinity;

    // ===================== INIT =====================
    function init() {
      const params = new URLSearchParams(window.location.search);
      const cat = params.get('cat') || 'hombre';
      const nombres = { hombre:'Hombre', mujer:'Mujer', kids:'Kids', running:'Running' };
      document.getElementById('catTitle').textContent = nombres[cat] || 'Categoría';
      document.getElementById('breadCat').textContent = nombres[cat] || 'Categoría';
      document.title = 'STREETKICKS - ' + (nombres[cat] || 'Categoría');
      updateCategorySwitch(cat);
      filterProducts();
    }

    function getCat() {
      return (new URLSearchParams(window.location.search).get('cat') || 'hombre').toLowerCase();
    }

    function updateCategorySwitch(cat) {
      const btn = document.getElementById('catSwitchBtn');
      if (!btn) return;

      if (cat === 'hombre') {
        btn.textContent = 'Ir a Mujer';
        btn.href = 'categoria.html?cat=mujer';
      } else if (cat === 'mujer') {
        btn.textContent = 'Ir a Hombre';
        btn.href = 'categoria.html?cat=hombre';
      } else {
        btn.textContent = 'Ir a Hombre';
        btn.href = 'categoria.html?cat=hombre';
      }
    }

    // ===================== FILTROS =====================
    function selectSingleDeporte(checkbox) {
      if (checkbox.checked) {
        // Desseleccionar todos los otros deportes
        const deporteCheckboxes = [...document.querySelectorAll('.filtro-grupo input[type=checkbox]')]
          .filter(c => ['Running','Fútbol','Básquet','Atletismo','Casual'].includes(c.value));
        deporteCheckboxes.forEach(cb => {
          if (cb !== checkbox) cb.checked = false;
        });
      }
      filterProducts();
    }

    function filterProducts() {
      const cat = getCat();
      const marcas = [...document.querySelectorAll('.filtro-grupo input[type=checkbox]:checked')]
        .filter(c => ['Nike','Adidas','Puma','New Balance','Asics'].includes(c.value))
        .map(c => c.value);
      const deportes = [...document.querySelectorAll('.filtro-grupo input[type=checkbox]:checked')]
        .filter(c => ['Running','Fútbol','Básquet','Atletismo','Casual'].includes(c.value))
        .map(c => c.value);
      const orden = document.querySelector('.orden-select').value;
      const busqueda = document.getElementById('searchInput').value.toLowerCase();

      let resultado = todosProductos.filter(p => {
        if (!p.cat.includes(cat)) return false;
        if (marcas.length && !marcas.includes(p.marca)) return false;
        if (deportes.length && !deportes.includes(p.deporte)) return false;
        if (p.precio < precioMin) return false;
        if (precioMax !== Infinity && p.precio > precioMax) return false;
        if (busqueda && !p.nombre.toLowerCase().includes(busqueda) && !p.marca.toLowerCase().includes(busqueda)) return false;
        return true;
      });

      if (orden === 'precio-asc') resultado.sort((a,b)=>a.precio-b.precio);
      else if (orden === 'precio-desc') resultado.sort((a,b)=>b.precio-a.precio);
      else if (orden === 'nombre') resultado.sort((a,b)=>a.nombre.localeCompare(b.nombre));

      document.getElementById('catCount').textContent = resultado.length + ' producto' + (resultado.length !== 1 ? 's' : '');
      renderProductos(resultado);
    }

    function renderProductos(lista) {
      const grid = document.getElementById('productosGrid');
      const noRes = document.getElementById('noResults');
      grid.innerHTML = '';
      if (!lista.length) { noRes.classList.remove('hidden'); return; }
      noRes.classList.add('hidden');
      lista.forEach(p => {
        const card = document.createElement('div');
        card.className = 'prod-card';
        card.innerHTML = `
          <div class="prod-img" onclick="openProduct(${p.id})">
            <img src="${p.img}" alt="${p.nombre}" loading="lazy" />
            <button class="prod-add-cart" type="button" onclick="event.stopPropagation(); openProduct(${p.id})">Comprar</button>
          </div>
          <div class="prod-info">
            <p class="prod-marca">${p.marca} · ${p.deporte}</p>
            <h3 class="prod-nombre">${p.nombre}</h3>
            <div class="prod-footer">
              <span class="prod-precio">$${p.precio}</span>
              <button type="button" class="btn-ver" onclick="event.stopPropagation(); openProduct(${p.id})">
                <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                Ver
              </button>
            </div>
          </div>`;
        grid.appendChild(card);
      });
    }

    function setPriceRange(min, max, btn) {
      const isActive = btn && btn.classList.contains('active');
      document.querySelectorAll('.precio-btn').forEach(b => b.classList.remove('active'));

      if (isActive) {
        precioMin = 0;
        precioMax = Infinity;
      } else {
        precioMin = min;
        precioMax = max;
        if (btn) btn.classList.add('active');
      }

      filterProducts();
    }

    function limpiarFiltros() {
      document.querySelectorAll('.filtro-grupo input[type=checkbox]').forEach(c => c.checked = false);
      document.querySelectorAll('.precio-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('searchInput').value = '';
      precioMin = 0;
      precioMax = Infinity;
      filterProducts();
    }

    // ===================== FILTROS MÓVIL =====================
    function openFiltros() {
      document.getElementById('filtrosPanel').classList.add('open');
      document.getElementById('filtrosOverlay').classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closeFiltros() {
      document.getElementById('filtrosPanel').classList.remove('open');
      document.getElementById('filtrosOverlay').classList.remove('active');
      document.body.style.overflow = '';
    }

    // ===================== PRODUCTO MODAL =====================
    function openProduct(id) {
      currentProduct = todosProductos.find(p => p.id === id);
      if (!currentProduct) return;
      selectedSize = null;
      document.getElementById('pmBrand').textContent = currentProduct.marca + ' · ' + currentProduct.deporte;
      document.getElementById('pmName').textContent = currentProduct.nombre;
      document.getElementById('pmPrice').textContent = '$' + currentProduct.precio;
      document.getElementById('pmDesc').textContent = currentProduct.desc;
      document.getElementById('pmInfoBox').innerHTML = currentProduct.info.split('\n').map(l=>`<p>${l}</p>`).join('');
      document.getElementById('pmMainImg').src = currentProduct.imgs[0];
      document.getElementById('selectedSize').textContent = '-';

      const thumbs = document.getElementById('pmThumbs'); thumbs.innerHTML = '';
      currentProduct.imgs.forEach((src, i) => {
        const t = document.createElement('img'); t.src = src; t.className = i===0 ? 'thumb active' : 'thumb';
        t.onclick = () => { document.getElementById('pmMainImg').src = src; thumbs.querySelectorAll('.thumb').forEach(x=>x.classList.remove('active')); t.classList.add('active'); };
        thumbs.appendChild(t);
      });

      const grid = document.getElementById('pmSizeGrid'); grid.innerHTML = '';
      tallas.forEach(s => {
        const btn = document.createElement('button'); btn.textContent = s; btn.className = 'size-btn';
        btn.onclick = () => { grid.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); selectedSize = s; document.getElementById('selectedSize').textContent = s; };
        grid.appendChild(btn);
      });

      document.getElementById('productOverlay').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeProduct(e) { if (e.target === document.getElementById('productOverlay')) closeProductModal(); }
    function closeProductModal() { document.getElementById('productOverlay').classList.remove('active'); document.body.style.overflow = ''; }

    function addToCart() {
      if (!selectedSize) { alert('Selecciona una talla primero.'); return; }
      const ex = cart.find(i => i.id === currentProduct.id && i.talla === selectedSize);
      if (ex) ex.qty++; else cart.push({ ...currentProduct, talla: selectedSize, qty: 1 });
      updateCartBadge(); syncCartStorage(); closeProductModal();
    }

    // ===================== CARRITO =====================
    function updateCartBadge() { document.getElementById('cartBadge').textContent = cart.reduce((s,i)=>s+i.qty,0); }
    function syncCartStorage() { localStorage.setItem('sk_cart', JSON.stringify(cart)); window.dispatchEvent(new CustomEvent('cartUpdated')); }
    function openCartPanel() { renderCart(); document.getElementById('cartOverlay').classList.add('active'); document.body.style.overflow = 'hidden'; }
    function closeCart() { document.getElementById('cartOverlay').classList.remove('active'); document.body.style.overflow = ''; }
    function closeCartEvent(e) { if (e.target === document.getElementById('cartOverlay')) closeCart(); }
    function renderCart() {
      const c = document.getElementById('cartItems'); c.innerHTML = '';
      if (!cart.length) { c.innerHTML = '<p style="text-align:center;color:#999;padding:2rem">Tu carrito está vacío</p>'; document.getElementById('cartTotal').textContent = '$0.00'; return; }
      let total = 0;
      cart.forEach((item, idx) => {
        total += item.precio * item.qty;
        const d = document.createElement('div'); d.className = 'cart-item';
        d.innerHTML = `<img src="${item.imgs[0]}" alt="${item.nombre}"/><div class="ci-info"><p class="ci-name">${item.nombre}</p><p class="ci-sub">Talla ${item.talla} · $${item.precio.toFixed(2)}</p><div class="ci-qty"><button onclick="changeQty(${idx},-1)">−</button><span>${item.qty}</span><button onclick="changeQty(${idx},1)">+</button></div></div><div class="ci-right"><button class="ci-delete" onclick="removeItem(${idx})">🗑</button><span class="ci-total">$${(item.precio*item.qty).toFixed(2)}</span></div>`;
        c.appendChild(d);
      });
      document.getElementById('cartTotal').textContent = '$' + total.toFixed(2);
    }
    function changeQty(idx, d) { cart[idx].qty += d; if (cart[idx].qty <= 0) cart.splice(idx,1); updateCartBadge(); syncCartStorage(); renderCart(); }
    function removeItem(idx) { cart.splice(idx,1); updateCartBadge(); syncCartStorage(); renderCart(); }
    document.getElementById('openCart').onclick = () => { window.location.href = 'Carrito.html'; };

    function initMiniCartPreview() {
      const btn = document.getElementById('openCart');
      if (!btn || document.getElementById('miniCart')) return;

      const wrapper = btn.parentElement;
      wrapper.style.position = 'relative';

      const mini = document.createElement('div');
      mini.id = 'miniCart';
      mini.className = 'mini-cart';
      mini.innerHTML = `
        <div class="mini-cart-header">
          <span>Tu carrito</span>
          <a href="Carrito.html" class="mini-ver-todo">Ver todo →</a>
        </div>
        <div class="mini-cart-items" id="miniCartItems"></div>
        <div class="mini-cart-footer">
          <div class="mini-total-row">
            <span>Total</span>
            <span id="miniTotal">$0.00</span>
          </div>
          <a href="Carrito.html" class="btn-primary mini-checkout-btn">Ir al carrito</a>
        </div>`;
      wrapper.appendChild(mini);

      let hideTimer;
      const showMini = () => {
        clearTimeout(hideTimer);
        renderMiniCartPreview();
        mini.classList.add('visible');
      };
      const hideMini = () => {
        hideTimer = setTimeout(() => mini.classList.remove('visible'), 250);
      };

      btn.addEventListener('mouseenter', showMini);
      btn.addEventListener('mouseleave', hideMini);
      mini.addEventListener('mouseenter', () => clearTimeout(hideTimer));
      mini.addEventListener('mouseleave', hideMini);
    }

    function renderMiniCartPreview() {
      const container = document.getElementById('miniCartItems');
      const totalEl = document.getElementById('miniTotal');
      if (!container || !totalEl) return;

      container.innerHTML = '';
      if (!cart.length) {
        container.innerHTML = '<p class="mini-empty">Tu carrito está vacío</p>';
        totalEl.textContent = '$0.00';
        return;
      }

      cart.slice(0, 4).forEach(item => {
        const row = document.createElement('div');
        row.className = 'mini-item';
        row.innerHTML = `
          <img src="${item.imgs ? item.imgs[0] : item.img}" alt="${item.nombre}" />
          <div class="mini-item-info">
            <p class="mini-item-name">${item.nombre}</p>
            <p class="mini-item-sub">Talla ${item.talla} · x${item.qty}</p>
          </div>
          <span class="mini-item-precio">$${(item.precio * item.qty).toFixed(2)}</span>`;
        container.appendChild(row);
      });

      if (cart.length > 4) {
        const more = document.createElement('p');
        more.className = 'mini-more';
        more.textContent = `+${cart.length - 4} producto${cart.length - 4 > 1 ? 's' : ''} más`;
        container.appendChild(more);
      }

      totalEl.textContent = '$' + cart.reduce((sum, item) => sum + item.precio * item.qty, 0).toFixed(2);
    }

    // ===================== NAV =====================
    document.getElementById('menuToggle').addEventListener('click', () => {
      document.getElementById('mobileMenu').classList.toggle('open');
      document.getElementById('menuToggle').classList.toggle('active');
    });

    init();
    initMiniCartPreview();
    updateCartBadge();
  </script>
  <script src="UserAuth.js"></script>
  <script src="Carrito_S.js"></script>
</body>
</html>
