<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STREETKICKS - Tienda Oficial</title>
  <link rel="stylesheet" href="Diseño_menu.css" />
  <link rel="stylesheet" href="Carrito.css" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="navbar">
    <div class="navbar-inner">

      <a href="Menu.html" class="logo">SPORTS<span>SHOES</span></a>

      <div class="search-bar">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" placeholder="Busca por modelo..." />
      </div>

    <div class="nav-icons">
      <button class="icon-btn" aria-label="Ubicación">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>
        </svg>
      </button>

      <a href="Usuario.html" class="icon-btn" id="btnIrUsuario" aria-label="Usuario">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </a>

      <a href="Facturas.html" class="icon-btn" aria-label="Facturas">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </a>

      <div class="cart-icon-wrapper">
        <a href="Carrito.html" class="icon-btn cart-btn" aria-label="Carrito">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9">
            <circle cx="9" cy="19" r="1.6"/><circle cx="17" cy="19" r="1.6"/>
            <path d="M3 4h2.2l1.8 9.2a1 1 0 0 0 1 .8h8.9a1 1 0 0 0 1-.7L20 7H6.3"/>
          </svg>
          <span id="cartBadge" class="cart-badge">0</span>
        </a>
      </div>
    </div>
  </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero-content">
        <p class="hero-tag">NUEVA TENDENCIA</p>
        <h1 class="hero-title">Zapatos deportivos</h1>
        <div class="hero-btns">
          <a href="#productos" class="btn-primary">Comprar ahora</a>
          <a href="categoria.html?cat=running" class="btn-outline">Ver catálogo</a>
        </div>
      </div>
    </section>

    <section class="carousel-section" id="productos">
      <div class="carousel-track" id="carouselTrack">
        </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p class="footer-logo">STREET<span>KICKS</span></p>
      <p>© 2026 StreetKicks. Proyecto Educativo.</p>
    </div>
  </footer>

  <script src="UserAuth.js"></script>
  <script src="Menu.js"></script>
  <script src="Carrito_S.js"></script>
  <script src="Carrito_M.js"></script>

</html>
